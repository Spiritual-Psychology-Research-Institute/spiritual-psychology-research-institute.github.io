<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 — 사이間 영성심리 연구소</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#5e6448" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%235e6448'/%3E%3Ctext x='50' y='73' text-anchor='middle' font-family='Noto Serif KR,serif' font-size='66' font-weight='500' fill='%23b08a5e'%3E%E9%96%93%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f1ece0;
        --paper: #f8f4e8;
        --ink: #3a3a2a;
        --ink-soft: #525a44;
        --muted: #62624e;
        --line: #cfc6ad;
        --moss-deep: #5e6448;
        --moss-mid: #9aa085;
        --terra: #b08a5e;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Noto Sans KR", system-ui, sans-serif;
        font-weight: 300;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px 24px;
        position: relative;
        overflow: hidden;
      }
      .wrap::before {
        content: "間";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-family: "Noto Serif KR", serif;
        font-size: clamp(280px, 60vw, 540px);
        color: var(--moss-deep);
        opacity: 0.05;
        font-weight: 300;
        line-height: 1;
        pointer-events: none;
      }
      .inner {
        position: relative;
        max-width: 560px;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-size: 11px;
        letter-spacing: 0.42em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 28px;
      }
      .eyebrow::before {
        content: "";
        width: 36px;
        height: 1px;
        background: var(--moss-mid);
      }
      .code {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: clamp(72px, 14vw, 132px);
        color: var(--terra);
        font-weight: 400;
        line-height: 1;
        margin: 0 0 24px;
        letter-spacing: -0.02em;
      }
      h1 {
        font-family: "Noto Serif KR", serif;
        font-weight: 300;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.35;
        color: var(--moss-deep);
        margin: 0 0 20px;
      }
      p {
        font-size: 15px;
        color: var(--ink-soft);
        margin: 0 0 36px;
        line-height: 1.95;
      }
      .actions {
        display: flex;
        gap: 18px;
        justify-content: center;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 28px;
        background: var(--moss-deep);
        color: #f4efe6;
        font-size: 13px;
        letter-spacing: 0.18em;
        border-radius: 999px;
        transition:
          background 0.3s ease,
          transform 0.3s ease;
      }
      .btn:hover {
        background: #4d5440;
        transform: translateY(-1px);
      }
      .btn-ghost {
        font-size: 13px;
        letter-spacing: 0.18em;
        color: var(--ink-soft);
        border-bottom: 1px solid var(--moss-mid);
        padding-bottom: 6px;
        transition: border-color 0.25s ease;
      }
      .btn-ghost:hover {
        border-color: var(--moss-deep);
      }
      .brand {
        position: absolute;
        top: 28px;
        left: 28px;
        font-family: "Noto Serif KR", serif;
        font-weight: 500;
        font-size: 15px;
        letter-spacing: 0.04em;
        color: var(--moss-deep);
      }
      .brand .han {
        color: var(--terra);
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="/" class="brand"
        >사이<span class="han">間</span> 영성심리 연구소</a
      >
      <div class="inner">
        <div class="eyebrow">404 · 길을 잃은 페이지</div>
        <p class="code">404</p>
        <h1>그 길은 사라졌지만,<br />사이間의 입구는 그대로 있습니다.</h1>
        <p>
          요청하신 페이지를 찾지 못했습니다. 잠시 숨을 고르고, 처음 자리로 함께
          돌아가요.
        </p>
        <div class="actions">
          <a class="btn" href="/">처음으로 돌아가기</a>
          <a class="btn-ghost" href="mailto:uninet1355057@hanmail.net"
            >대신 메일로 연락하기</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
